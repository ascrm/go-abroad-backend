server:
  port: 8080

spring:
  application:
    name: go-abroad-backend

  # 数据库配置 (使用PostgreSQL)
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/go_abroad
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      auto-commit: true
      idle-timeout: 30000
      pool-name: GoAbroadHikariCP
      max-lifetime: 1800000
      connection-timeout: 30000

  # JPA配置
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Redis配置
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      database: 0  # 数据库编号
      timeout: 3000ms  # 连接超时时间
      lettuce:
        pool:
          max-active: 8  # 最大连接数
          max-idle: 8  # 最大空闲连接数
          min-idle: 2  # 最小空闲连接数
          max-wait: -1ms  # 最大等待时间，-1表示无限等待

# Spring AI 配置 (DeepSeek)
spring.ai:
  deepseek:
    api-key: ${DEEPSEEK_API_KEY}
    chat:
      options:
        model: deepseek-chat
        temperature: 0

# JWT配置
jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

# 邮件配置
spring.mail:
  host: smtp.qq.com
  port: 587
  username: ${MAIL_USERNAME}
  password: ${MAIL_PASSWORD}
  properties:
    mail.smtp.auth: true
    mail.smtp.starttls.enable: true
    mail.smtp.starttls.required: true

# 应用配置
app:
  # 邮件服务配置
  email:
    enabled: ${EMAIL_ENABLED}
    signature: ${EMAIL_SIGNATURE}

  # 短信服务配置（新版本SDK）
  sms:
    enabled: ${SMS_ENABLED}
    region: ${SMS_REGION}
    endpoint: dypnsapi.aliyuncs.com
    signature: ${SMS_SIGNATURE}
    template-code: ${SMS_TEMPLATE_CODE}
