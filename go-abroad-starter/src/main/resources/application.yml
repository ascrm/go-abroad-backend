server:
  port: 8080

spring:
  profiles:
    active: dev
  application:
    name: go-abroad-backend

  # 数据库配置 (使用PostgreSQL)
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/go_abroad
    username: ${spring.datasource.username}
    password: ${spring.datasource.password}
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      auto-commit: true
      idle-timeout: 30000
      pool-name: GoAbroadHikariCP
      max-lifetime: 1800000
      connection-timeout: 30000

  # JPA配置
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Redis配置
  data:
    redis:
      host: ${spring.data.redis.host}
      port: ${spring.data.redis.port}
      password: ${spring.data.redis.password}
      database: 0  # 数据库编号
      timeout: 3000ms  # 连接超时时间
      lettuce:
        pool:
          max-active: 8  # 最大连接数
          max-idle: 8  # 最大空闲连接数
          min-idle: 2  # 最小空闲连接数
          max-wait: -1ms  # 最大等待时间，-1表示无限等待

# Spring AI 配置 (DeepSeek)
spring.ai:
  deepseek:
    api-key: ${spring.ai.deepseek.api-key}
    chat:
      options:
        model: deepseek-chat
        temperature: 0

# JWT配置
jwt:
  secret: ${jwt.secret}

# 邮件配置
spring.mail:
  host: smtp.qq.com
  port: 587
  username: ${spring.mail.username}
  password: ${spring.mail.password}
  properties:
    mail.smtp.auth: true
    mail.smtp.starttls.enable: true
    mail.smtp.starttls.required: true

# 应用配置
app:
  # 邮件服务配置
  email:
    enabled: ${app.email.enabled}
    signature: ${app.email.signature}

  # 短信服务配置（新版本SDK）
  sms:
    enabled: ${app.sms.enabled}
    region: ${app.sms.region}
    endpoint: dypnsapi.aliyuncs.com
    signature: ${app.sms.signature}
    template-code: ${app.sms.template-code}

  # 第三方登录配置
  social:
    google:
      client-id: ${app.social.google.client-id}
      redirect-uri: ${app.social.google.redirect-uri}
